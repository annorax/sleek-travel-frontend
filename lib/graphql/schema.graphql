type AuthResponse {
  error: String
  token: String
  user: User
}

input CreateItemInput {
  code: String!
  depthInCms: Float
  description: String
  heightInCms: Float
  name: String!
  productId: Int
  userId: Int!
  weightInKgs: Float
  widthInCms: Float
}

input CreateProductInput {
  amazonASIN: String
  brand: String
  color: String
  country: String
  currency: Currency!
  depthInCms: Float
  description: String
  heightInCms: Float
  model: String
  name: String!
  price: String!
  upc: String
  upcScanned: Boolean
  weightInKgs: Float
  widthInCms: Float
}

input CreatePurchaseOrderInput {
  entries: [PurchaseOrderEntryInput!]!
  price: String!
  status: PurchaseOrderStatus!
  userId: Int!
}

enum Currency {
  EUR
}

"""
A date-time string at UTC, such as 2007-12-03T10:15:30Z, compliant with the `date-time` format outlined in section 5.6 of the RFC 3339 profile of the ISO 8601 standard for representation of dates and times using the Gregorian calendar.
"""
scalar DateTime

type Item {
  code: String
  depthInCms: Float
  description: String
  heightInCms: Float
  id: Int
  name: String
  product: Product
  user: User
  weightInKgs: Float
  widthInCms: Float
}

input ItemOrderByInput {
  direction: SortOrder
  field: ItemScalarFieldEnum!
}

enum ItemScalarFieldEnum {
  code
  createdAt
  depthInCms
  description
  heightInCms
  id
  name
  productId
  updatedAt
  userId
  weightInKgs
  widthInCms
}

type Mutation {
  createItem(input: CreateItemInput!): Item
  createProduct(input: CreateProductInput!): Product
  createPurchaseOrder(input: CreatePurchaseOrderInput!): PurchaseOrder
  deleteItem(id: Int!): Boolean
  deleteProduct(id: Int!): Boolean
  deletePurchaseOrder(id: Int!): Boolean
  logInUser(emailOrPhone: String!, password: String!): AuthResponse
  logOutUser: Boolean
  registerUser(email: String!, name: String!, password: String!, phoneNumber: String!): RegisterUserResponse
  resendEmailVerificationRequest(email: String!): SimpleResponse
  resendPhoneNumberVerificationRequest(phoneNumber: String!): SimpleResponse
  sendPasswordResetLink(emailOrPhone: String!): Boolean
  updateItem(id: Int!, input: UpdateItemInput!): Item
  updateProduct(id: Int!, input: UpdateProductInput!): Product
  updatePurchaseOrder(id: Int!, input: UpdatePurchaseOrderInput!): PurchaseOrder
  validateToken(tokenValue: String!): AuthResponse
  verifyEmailAddress(token: String!): Boolean
  verifyPhoneNumber(otp: String!, userId: Int!): Boolean
}

type Product {
  amazonASIN: String
  brand: String
  color: String
  country: String
  currency: Currency
  depthInCms: Float
  description: String
  heightInCms: Float
  id: Int
  items: [Item!]
  model: String
  name: String
  price: String
  purchaseOrderEntries: [PurchaseOrderEntry!]
  upc: String
  upcScanned: Boolean
  weightInKgs: Float
  widthInCms: Float
}

input ProductOrderByInput {
  direction: SortOrder
  field: ProductScalarFieldEnum!
}

enum ProductScalarFieldEnum {
  amazonASIN
  brand
  color
  country
  createdAt
  currency
  depthInCms
  description
  heightInCms
  id
  model
  name
  price
  upc
  upcScanned
  updatedAt
  weightInKgs
  widthInCms
}

type PurchaseOrder {
  entries: [PurchaseOrderEntry!]
  id: Int
  price: String
  status: PurchaseOrderStatus
  user: User
}

type PurchaseOrderEntry {
  currency: Currency
  id: Int
  order: PurchaseOrder
  product: Product
  quantity: Int
  unitPrice: String
}

input PurchaseOrderEntryInput {
  currency: Currency!
  productId: Int!
  quantity: Int!
  unitPrice: String!
}

input PurchaseOrderOrderByInput {
  direction: SortOrder
  field: PurchaseOrderScalarFieldEnum!
}

enum PurchaseOrderScalarFieldEnum {
  createdAt
  id
  price
  status
  updatedAt
  userId
}

enum PurchaseOrderStatus {
  FULFILLED
  ORDERED_FROM_VENDOR
  PAID
  SUBMITTED
}

type Query {
  listAllItems(orderBy: [ItemOrderByInput!], skip: Int, take: Int): [Item!]
  listAllProducts(orderBy: [ProductOrderByInput!], skip: Int, take: Int): [Product!]
  listAllPurchaseOrders(orderBy: [PurchaseOrderOrderByInput!], skip: Int, take: Int): [PurchaseOrder!]
}

type RegisterUserResponse {
  error: String
  userId: Int
}

enum Role {
  ADMIN
  NORMAL
}

type SimpleResponse {
  error: String
}

enum SortOrder {
  asc
  desc
}

input UpdateItemInput {
  depthInCms: Float
  description: String
  heightInCms: Float
  name: String
  productId: Int
  weightInKgs: Float
  widthInCms: Float
}

input UpdateProductInput {
  amazonASIN: String
  brand: String
  color: String
  country: String
  currency: Currency
  depthInCms: Float
  description: String
  heightInCms: Float
  model: String
  name: String
  price: String
  upc: String
  upcScanned: Boolean
  weightInKgs: Float
  widthInCms: Float
}

input UpdatePurchaseOrderInput {
  price: String
  status: PurchaseOrderStatus
}

type User {
  email: String
  id: Int
  items: [Item!]
  name: String
  phoneNumber: String
  purchaseOrders: [PurchaseOrder!]
  role: Role
}
