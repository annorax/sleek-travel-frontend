name: sleek_travel_frontend
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.19.1
  cupertino_icons: ^1.0.9
  envied: ^1.3.5
  flutter_slidable: ^4.0.1
  form_validator: ^2.1.1
  graphql_flutter: ^5.2.0-beta.8
  image_picker: ^1.2.2
  intl: ^0.20.2
  mobile_scanner: ^7.2.0
  navigation_utils: ^0.9.11
  pinput: ^6.0.2
  rxdart: ^0.28.0
  shared_preferences: ^2.5.5
  smart_auth: ^3.2.0


dev_dependencies:
  build_runner: ^2.15.0
  envied_generator: ^1.3.5
  graphql_codegen: ^3.0.1

  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  # path_provider_foundation 2.6.0 introduced objective_c 9.x which has a
  # native build hook that breaks build_runner 2.x (dart compile aot-snapshot).
  # 2.5.1 is identical at runtime on iOS/macOS and has no objective_c dep.
  path_provider_foundation: 2.5.1

flutter:
  uses-material-design: true
